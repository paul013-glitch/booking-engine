<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campify</title>
    <meta
      name="description"
      content="Campify helps surf camps sell rooms, packages, and bookings from one simple admin."
    />
    <script>
      (function () {
        const base = window.location.protocol === "file:" ? "./" : "/";
        document.write('<link rel="stylesheet" href="' + base + 'styles.css" />');
      })();
    </script>
  </head>
  <body class="page page-landing page-landing-slim">
    <main class="landing-shell landing-shell-center">
      <section class="hero-card hero-card-center">
        <p class="eyebrow">Campify</p>
        <h1>Booking software for surf camps.</h1>
        <p class="lede">
          A simple, private admin for camp owners and a clean booking flow for guests.
        </p>

        <div class="landing-actions landing-actions-center">
          <button class="button button-primary" type="button" id="landingLogin">
            Login / Sign up
          </button>
          <a class="button button-secondary" href="./book/amigos-surf-camp">See demo</a>
        </div>

        <p class="tiny landing-note">
          Logged in users are sent straight to the admin editor.
        </p>
      </section>
    </main>

    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script>
      (function () {
        const base = window.location.protocol === "file:" ? "./" : "/";
        const script = document.createElement("script");
        script.src = base + "app.js";
        document.body.appendChild(script);
      })();
    </script>
  </body>
</html>
