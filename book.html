<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book | Amigos Surf Camp</title>
    <meta
      name="description"
      content="Booking flow for a surf camp with live summary and inventory-aware availability."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="page page-book">
    <header class="book-header">
      <img id="campLogo" class="camp-logo" alt="Camp logo" />
      <div>
        <p class="eyebrow">Camp booking page</p>
        <h1 id="campName">Amigos Surf Camp</h1>
      </div>
    </header>

    <main class="booking-shell">
      <section class="panel wizard-panel">
        <div class="panel-head">
          <div>
            <p class="section-label">Guest flow</p>
            <h2>5 simple steps</h2>
          </div>
          <p class="muted">Package, Date, Room, Add-ons, Book</p>
        </div>
        <nav class="stepper" id="stepper" aria-label="Booking steps"></nav>
        <div id="wizardContent"></div>
      </section>

      <aside class="panel summary-panel" id="summaryPanel" aria-live="polite"></aside>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
